        cpus: "4"
        memory: "8g"
        timeout_per_command: 300

      env_vars: {}
      setup_commands: []
      pre_process: null

      limits:
        max_iterations: 1
        total_timeout_sec: 1800

      evaluation:
        - level: "L2"
          method: "unit_test"
          enabled: true
          params:
            # Explicitly run the test file copied into the container (/workspace/tests/)
            test_command: "python -m pytest /workspace/tests/test_fix.py -v --tb=short"
